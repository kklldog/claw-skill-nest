version: '3.8'

services:
  skillhub:
    image: node:20-alpine
    container_name: skillhub
    working_dir: /app
    volumes:
      - .:/app
      - skillhub_data:/app/data
    ports:
      - "17890:17890"
    command: sh -c "npm install && node index.js --config=config.json"
    restart: unless-stopped

volumes:
  skillhub_data:
