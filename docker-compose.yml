version: '3.8'

services:
  claw-skill-nest:
    image: node:20-alpine
    container_name: claw-skill-nest
    working_dir: /app
    volumes:
      - .:/app
      - claw-skill-nest_data:/app/data
    ports:
      - "17890:17890"
    command: sh -c "npm install && node index.js --config=config.json"
    restart: unless-stopped

volumes:
  claw-skill-nest_data:
